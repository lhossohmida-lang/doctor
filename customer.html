<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>رقم الدور | عيادة الطبيب</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/customer.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script type="module" src="js/customer.js"></script>
  </head>
  <body class="customer-page">
    <main class="customer-shell">
      <section class="customer-card">
        <a class="back-link" href="index.html">الرئيسية</a>
        <div class="brand-mark small" aria-hidden="true">+</div>
        <p class="eyebrow">تسجيل ومتابعة الدور</p>
        <h1>خذ رقمك اليوم</h1>
        <form id="phoneLookupForm" class="lookup-form">
          <label>
            الاسم الكامل
            <input id="customerFullName" type="text" autocomplete="name" required placeholder="اكتب اسمك الكامل" maxlength="80" />
          </label>
          <label>
            رقم الهاتف
            <input id="lookupPhone" type="tel" inputmode="tel" autocomplete="tel" required placeholder="0550000000" />
          </label>
          <label>
            سبب الزيارة أو المرض
            <textarea id="customerDisease" required placeholder="مثال: فحص عام، ألم، متابعة علاج..." maxlength="160"></textarea>
          </label>
          <button id="customerSubmitButton" class="btn btn-primary full" type="submit">الحصول على رقم الدور</button>
        </form>
        <p id="customerMessage" class="form-message" role="status"></p>
      </section>

      <section id="trackingResults" class="tracking-results" aria-live="polite"></section>
      <section id="customerPrintArea" aria-hidden="true"></section>
    </main>
  </body>
</html>
